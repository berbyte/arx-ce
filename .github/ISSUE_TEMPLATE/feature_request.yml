name: Feature request
description: Suggest something you'd like ARX to do
title: "[Feature] "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe the problem you're trying to solve and we'll figure out the best way to address it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where you felt something was missing or harder than it should be.
      placeholder: "e.g. After a session I can't tell which prompts led to the most rework — I have to dig through logs manually"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the feature or behavior you're imagining. Rough ideas welcome.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important — it limits how useful ARX is for me
        - Blocking — I can't get value from ARX without this
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, examples, links, or anything else that helps illustrate the request.
    validations:
      required: false
